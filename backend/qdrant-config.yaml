service:
  host: 0.0.0.0
  port: 6333
  enable_cors: true

storage:
  # Stockage persistant
  storage_path: /qdrant/storage
  
  # Configuration mémoire pour développement
  in_memory_payload_index_threshold: 20000

# Configuration pour optimiser les performances
cluster:
  enabled: false

# Configuration des collections par défaut
collection:
  # Configuration HNSW pour recherche vectorielle rapide
  hnsw_config:
    m: 16                    # Nombre de connexions bidirectionnelles
    ef_construct: 200        # Taille de la liste dynamique lors de construction
    full_scan_threshold: 10000

  # Configuration pour économiser la mémoire en développement
  quantization_config:
    scalar:
      type: int8
      quantile: 0.99
      always_ram: true

# Configuration des logs
log_level: INFO

# Configuration de la sécurité (désactivée en dev)
service:
  enable_cors: true
  cors_allow_origin: "*"