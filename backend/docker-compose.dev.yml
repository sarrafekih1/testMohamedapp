# Setup dev pour RAG Chatbot MVP
#docker-compose.dev.yml
# Note: version: '3.8' obsolete avec DOcker Compose v2+

services:
  # PostgreSQL Database
  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_DB: ragbot_dev
      #POSTGRES_DB: postgres
      POSTGRES_USER: ragdev
      #POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d/
    restart: unless-stopped
    command: >
      postgres -c log_statement=all
               -c log_destination=stderr
               -c logging_collector=on
               -c max_connections=100
               -c shared_buffers=256MB

  # Redis Cache
  redis-dev:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Qdrant Vector Database
  qdrant-dev:
    # image: qdrant/qdrant:v1.5.0
    image: qdrant/qdrant:v1.11.0
    container_name: qdrant-dev
    ports:
      - "6333:6333"  #API HTTP
      - "6334:6334"  # gRPC port (optional)
    volumes:
      - qdrant_dev_data:/qdrant/storage
      - ./qdrant-config.yaml:/qdrant/config/production.yaml  # AJOUT DU CONFIG FILE
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__LOG_LEVEL: INFO


  # Adminer (Interface web pour PostgreSQL)
  adminer:
    image: adminer:4.8.1
    container_name: rag-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-dev
    restart: unless-stopped
    depends_on:
      - postgres-dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  qdrant_dev_data:

networks:
  default:
    name: rag-dev-network